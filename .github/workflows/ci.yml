name: CI — Test & Build

on:
  pull_request:
    branches: [dev, staging, pre-live, main]
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q app main.py

      - name: Import smoke check
        env:
          ANTHROPIC_API_KEY: ci-placeholder
          LOCAL_DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/vyuflo
          ZOHO_DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/zoho
          AWS_ACCESS_KEY_ID: ci-placeholder
          AWS_SECRET_ACCESS_KEY: ci-placeholder
          AWS_REGION: us-east-1
          S3_BUCKET: ci-placeholder
          ZOHO_CLIENT_ID: ci-placeholder
          ZOHO_CLIENT_SECRET: ci-placeholder
          ZOHO_REFRESH_TOKEN: ci-placeholder
          ZOHO_ORG_ID: ci-placeholder
          ZOHO_WORKSPACE_ID: ci-placeholder
          FRONTEND_URL: http://localhost:3000
          SECRET_KEY: ci-secret-key-not-for-production
          DATABASE_ENV: local
          STORAGE_BACKEND: local
          REDIS_URL: redis://localhost:6379/0
          CORS_ORIGINS: '["http://localhost:3000"]'
          COOKIE_SECURE: "false"
          DEBUG: "true"
        run: |
          python -c "from app.core.config import settings; print(settings.APP_NAME, settings.APP_VERSION)"

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: vyuflo-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
