# Base compose — copy/adapt per host as docker-compose.<env>.yml
# App secrets live in .env on the server (never commit real .env files).

services:
  backend:
    build: ./backend
    container_name: vyuflo-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: vyuflo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  backend_uploads:
  redis_data:
